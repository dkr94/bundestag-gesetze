<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bundestag Gesetze</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 20px; font-weight: 500; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  select, input[type="text"] { font-size: 13px; padding: 7px 11px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: #ebebeb; border: 0.5px solid #d0d0d0; cursor: pointer; color: #555; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: #ddeeff; color: #0c447c; border-color: #99c2ee; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: #fff; border-radius: 8px; padding: 0.75rem 1rem; border: 0.5px solid #e0e0e0; }
  .stat-label { font-size: 12px; color: #777; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .list { display: flex; flex-direction: column; gap: 8px; }
  .item { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .item:hover { border-color: #aaa; }
  .item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .item-title { font-size: 14px; font-weight: 500; line-height: 1.4; flex: 1; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-blue { background: #E6F1FB; color: #0C447C; }
  .badge-amber { background: #FAEEDA; color: #633806; }
  .badge-green { background: #EAF3DE; color: #27500A; }
  .badge-gray { background: #F1EFE8; color: #444441; }
  .item-meta { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .meta-item { font-size: 12px; color: #777; display: flex; align-items: center; gap: 4px; }
  .fraktion-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .detail-panel { background: #f5f4f0; border-radius: 8px; padding: 1rem; margin-top: 10px; display: none; }
  .detail-panel.open { display: block; }
  .detail-label { font-size: 12px; font-weight: 500; color: #777; margin-top: 10px; margin-bottom: 3px; }
  .detail-label:first-child { margin-top: 0; }
  .detail-text { font-size: 13px; color: #1a1a1a; line-height: 1.6; }
  .detail-link { font-size: 12px; color: #185FA5; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 10px; }
  .detail-link:hover { text-decoration: underline; }
  .loading { text-align: center; padding: 3rem; color: #777; font-size: 14px; }
  .error-box { background: #fff0f0; border: 0.5px solid #f5b8b8; border-radius: 8px; padding: 1rem; color: #a32d2d; font-size: 13px; line-height: 1.6; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.5rem; }
  .page-info { font-size: 13px; color: #777; }
  .pagination button { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; cursor: pointer; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .empty { text-align: center; padding: 2rem; color: #777; font-size: 14px; }
  @media (max-width: 600px) { .top-bar { flex-direction: column; align-items: flex-start; } }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1><i class="ti ti-building-bank" style="font-size:18px; vertical-align:-2px; margin-right:6px;"></i>Bundestag Gesetze</h1>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Suche..." style="width:200px;" />
    </div>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-typ="">Alle</button>
    <button class="filter-btn" data-typ="Gesetzgebung">Gesetzgebung</button>
    <button class="filter-btn" data-typ="Antrag">Antrag</button>
    <button class="filter-btn" data-typ="Anfrage">Anfrage</button>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Geladen</div><div class="stat-value" id="statTotal">–</div></div>
    <div class="stat-card"><div class="stat-label">Angezeigt</div><div class="stat-value" id="statShown">–</div></div>
    <div class="stat-card"><div class="stat-label">Wahlperiode</div><div class="stat-value">21</div></div>
  </div>

  <div id="listContainer"><div class="loading"><i class="ti ti-loader"></i> Daten werden geladen…</div></div>
  <div class="pagination" id="pagination" style="display:none;">
    <button id="prevBtn">← Zurück</button>
    <span class="page-info" id="pageInfo"></span>
    <button id="nextBtn">Weiter →</button>
  </div>
</div>

<script>
const API_KEY = 'OSOegLs.PR2lwJ1dwCeje9vTj7FPOt3hvpYKtwKkhw';
const BASE = 'https://search.dip.bundestag.de/api/v1';

const FRAKTION_FARBEN = {
  'SPD':{ bg:'#FAECE7', color:'#993C1D' },
  'CDU':{ bg:'#E6F1FB', color:'#0C447C' },
  'CSU':{ bg:'#E6F1FB', color:'#185FA5' },
  'CDU/CSU':{ bg:'#E6F1FB', color:'#0C447C' },
  'Bündnis 90/Die Grünen':{ bg:'#EAF3DE', color:'#3B6D11' },
  'Grüne':{ bg:'#EAF3DE', color:'#3B6D11' },
  'FDP':{ bg:'#FAEEDA', color:'#633806' },
  'AfD':{ bg:'#F1EFE8', color:'#444441' },
  'Die Linke':{ bg:'#FBEAF0', color:'#723554' },
  'BSW':{ bg:'#FBEAF0', color:'#72243E' },
};

function getFraktionStyle(name) {
  if (!name) return { bg:'#F1EFE8', color:'#444441' };
  for (const key of Object.keys(FRAKTION_FARBEN)) {
    if (name.includes(key)) return FRAKTION_FARBEN[key];
  }
  return { bg:'#F1EFE8', color:'#444441' };
}

function getStatusBadge(status) {
  if (!status) return { cls:'badge-gray', label:'Unbekannt' };
  const s = status.toLowerCase();
  if (s.includes('beschlossen') || s.includes('verabschiedet') || s.includes('abgeschlossen')) return { cls:'badge-green', label:'Verabschiedet' };
  if (s.includes('beratung') || s.includes('anhängig') || s.includes('überwiesen')) return { cls:'badge-blue', label:'In Beratung' };
  if (s.includes('eingebracht') || s.includes('eingegangen')) return { cls:'badge-amber', label:'Eingebracht' };
  if (s.includes('abgelehnt') || s.includes('erledigt')) return { cls:'badge-gray', label:'Abgeschlossen' };
  return { cls:'badge-amber', label: status.substring(0,30) };
}

let allItems = [], filtered = [], currentPage = 0;
const perPage = 10;
let activeTyp = '', searchTerm = '', openId = null;

async function fetchVorgaenge() {
  try {
    const params = new URLSearchParams({ apikey: API_KEY, 'f.wahlperiode':'21', format:'json', rows:'100' });
    const res = await fetch(`${BASE}/vorgang?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.documents || [];
  } catch(e) { return null; }
}

function applyFilters() {
  filtered = allItems.filter(item => {
    const matchTyp = !activeTyp || (item.typ && item.typ.includes(activeTyp));
    const matchSearch = !searchTerm || (item.titel && item.titel.toLowerCase().includes(searchTerm.toLowerCase()));
    return matchTyp && matchSearch;
  });
  currentPage = 0;
  document.getElementById('statShown').textContent = filtered.length;
  renderPage();
}

function renderPage() {
  const start = currentPage * perPage;
  const pageItems = filtered.slice(start, start + perPage);
  const container = document.getElementById('listContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Keine Ergebnisse gefunden.</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  container.innerHTML = '<div class="list" id="itemList"></div>';
  const list = document.getElementById('itemList');
  pageItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';
    const badge = getStatusBadge(item.beratungsstand || item.initiative);
    const fraktion = item.initiative?.[0] || '';
    const fStyle = getFraktionStyle(fraktion);
    const datum = item.datum ? new Date(item.datum).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' }) : '';
    const titel = item.titel || '(kein Titel)';
    const kurzTitel = titel.length > 120 ? titel.substring(0,120) + '…' : titel;
    div.innerHTML = `
      <div class="item-top">
        <div class="item-title">${kurzTitel}</div>
        <span class="badge ${badge.cls}">${badge.label}</span>
      </div>
      <div class="item-meta">
        ${datum ? `<span class="meta-item"><i class="ti ti-calendar" style="font-size:13px;"></i>${datum}</span>` : ''}
        ${item.typ ? `<span class="meta-item"><i class="ti ti-file-text" style="font-size:13px;"></i>${item.typ}</span>` : ''}
        ${fraktion ? `<span class="fraktion-pill" style="background:${fStyle.bg}; color:${fStyle.color};">${fraktion}</span>` : ''}
      </div>
      <div class="detail-panel" id="detail-${item.id}">
        <div class="detail-label">Vorgangsnummer</div>
        <div class="detail-text">${item.id || '–'}</div>
        ${item.abstract ? `<div class="detail-label">Kurzbeschreibung</div><div class="detail-text">${item.abstract}</div>` : ''}
        ${item.deskriptor ? `<div class="detail-label">Schlagworte</div><div class="detail-text">${item.deskriptor.map(d => d.name).join(', ')}</div>` : ''}
        <a class="detail-link" href="https://dip.bundestag.de/vorgang/${item.id}" target="_blank">
          <i class="ti ti-external-link" style="font-size:13px;"></i> Im Bundestag öffnen
        </a>
      </div>`;
    div.addEventListener('click', () => {
      const panel = document.getElementById(`detail-${item.id}`);
      if (openId && openId !== item.id) {
        const old = document.getElementById(`detail-${openId}`);
        if (old) old.classList.remove('open');
      }
      panel.classList.toggle('open');
      openId = panel.classList.contains('open') ? item.id : null;
    });
    list.appendChild(div);
  });
  const totalPages = Math.ceil(filtered.length / perPage);
  const pg = document.getElementById('pagination');
  if (totalPages > 1) {
    pg.style.display = 'flex';
    document.getElementById('pageInfo').textContent = `Seite ${currentPage + 1} von ${totalPages}`;
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
  } else { pg.style.display = 'none'; }
}

document.getElementById('prevBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; renderPage(); } });
document.getElementById('nextBtn').addEventListener('click', () => { const tp = Math.ceil(filtered.length / perPage); if (currentPage < tp - 1) { currentPage++; renderPage(); } });
document.getElementById('filterRow').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeTyp = e.target.dataset.typ;
    applyFilters();
  }
});
document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; applyFilters(); });

(async () => {
  const docs = await fetchVorgaenge();
  if (!docs) {
    document.getElementById('listContainer').innerHTML = `<div class="error-box"><strong>API nicht erreichbar.</strong><br>Mögliche Ursache: CORS-Einschränkung im Browser. Auf GitHub Pages funktioniert das korrekt.<br><a href="https://dip.bundestag.de" target="_blank" style="color:#a32d2d;">Direkt auf dip.bundestag.de öffnen</a></div>`;
    return;
  }
  allItems = docs;
  document.getElementById('statTotal').textContent = docs.length;
  document.getElementById('statShown').textContent = docs.length;
  filtered = [...allItems];
  renderPage();
})();
</script>
</body>
</html>
