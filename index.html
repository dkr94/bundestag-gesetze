<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bundestag Gesetze</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 20px; font-weight: 500; }
  input[type="text"], input[type="date"], select { font-size: 13px; padding: 7px 11px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; }
  .filter-section { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; min-width: 90px; flex-shrink: 0; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: #ebebeb; border: 0.5px solid #d0d0d0; cursor: pointer; color: #555; transition: all 0.15s; white-space: nowrap; }
  .filter-btn:hover, .filter-btn.active { background: #ddeeff; color: #0c447c; border-color: #99c2ee; }
  .wp-select { font-size: 13px; padding: 5px 10px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; }
  .wp-label { font-size: 12px; color: #777; }
  .date-range { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .date-range input[type="date"] { font-size: 12px; padding: 5px 8px; }
  .date-sep { font-size: 12px; color: #999; }
  .clear-btn { font-size: 11px; padding: 4px 8px; border-radius: 6px; background: none; border: 0.5px solid #ccc; cursor: pointer; color: #888; }
  .clear-btn:hover { border-color: #aaa; color: #555; }
  .typ-hinweis { font-size: 13px; color: #555; background: #f0f4ff; border-left: 3px solid #99c2ee; border-radius: 0 6px 6px 0; padding: 8px 12px; margin-bottom: 1rem; line-height: 1.5; display: none; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: #fff; border-radius: 8px; padding: 0.75rem 1rem; border: 0.5px solid #e0e0e0; }
  .stat-label { font-size: 12px; color: #777; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .list { display: flex; flex-direction: column; gap: 8px; }
  .item { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .item:hover { border-color: #aaa; }
  .item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .item-title { font-size: 14px; font-weight: 500; line-height: 1.4; flex: 1; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-blue { background: #E6F1FB; color: #0C447C; }
  .badge-amber { background: #FAEEDA; color: #633806; }
  .badge-green { background: #EAF3DE; color: #27500A; }
  .badge-gray { background: #F1EFE8; color: #444441; }
  .item-meta { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .meta-item { font-size: 12px; color: #777; display: flex; align-items: center; gap: 4px; }
  .fraktion-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .detail-panel { background: #f5f4f0; border-radius: 8px; padding: 1rem; margin-top: 10px; display: none; }
  .detail-panel.open { display: block; }
  .detail-label { font-size: 12px; font-weight: 500; color: #777; margin-top: 10px; margin-bottom: 3px; }
  .detail-label:first-child { margin-top: 0; }
  .detail-text { font-size: 13px; color: #1a1a1a; line-height: 1.6; }
  .detail-link { font-size: 12px; color: #185FA5; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 10px; }
  .detail-link:hover { text-decoration: underline; }
  .loading { text-align: center; padding: 3rem; color: #777; font-size: 14px; }
  .error-box { background: #fff0f0; border: 0.5px solid #f5b8b8; border-radius: 8px; padding: 1rem; color: #a32d2d; font-size: 13px; line-height: 1.6; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.5rem; }
  .page-info { font-size: 13px; color: #777; }
  .pagination button { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; cursor: pointer; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .empty { text-align: center; padding: 2rem; color: #777; font-size: 14px; }
  @media (max-width: 600px) { .top-bar { flex-direction: column; align-items: flex-start; } .filter-label { min-width: 70px; } }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1><i class="ti ti-building-bank" style="font-size:18px; vertical-align:-2px; margin-right:6px;"></i>Bundestag Gesetze</h1>
    <input type="text" id="searchInput" placeholder="Suche..." style="width:200px;" />
  </div>

  <div class="filter-section">

    <!-- Wahlperiode -->
    <div class="filter-row">
      <span class="filter-label">Wahlperiode</span>
      <select class="wp-select" id="wahlperiodeSelect">
        <option value="21">21. Wahlperiode (2025 – heute)</option>
        <option value="20">20. Wahlperiode (2021 – 2025)</option>
        <option value="19">19. Wahlperiode (2017 – 2021)</option>
        <option value="18">18. Wahlperiode (2013 – 2017)</option>
        <option value="17">17. Wahlperiode (2009 – 2013)</option>
      </select>
    </div>

    <!-- Zeitraum Schnellauswahl -->
    <div class="filter-row" id="zeitraumRow">
      <span class="filter-label">Zeitraum</span>
      <button class="filter-btn active" data-zeitraum="">Alle</button>
      <button class="filter-btn" data-zeitraum="7">Diese Woche</button>
      <button class="filter-btn" data-zeitraum="30">Dieser Monat</button>
      <button class="filter-btn" data-zeitraum="90">Dieses Quartal</button>
      <button class="filter-btn" data-zeitraum="365">Dieses Jahr</button>
      <button class="filter-btn" data-zeitraum="custom">Eigener Zeitraum</button>
    </div>

    <!-- Eigener Zeitraum -->
    <div class="filter-row" id="customDateRow" style="display:none;">
      <span class="filter-label">Von / Bis</span>
      <div class="date-range">
        <input type="date" id="dateFrom" />
        <span class="date-sep">bis</span>
        <input type="date" id="dateTo" />
        <button class="clear-btn" id="clearDates">× Zurücksetzen</button>
      </div>
    </div>

    <!-- Typ -->
    <div class="filter-row">
      <span class="filter-label">Typ</span>
      <div style="display:flex; gap:6px; flex-wrap:wrap;" id="filterRow">
        <button class="filter-btn active" data-typ="">Alle</button>
        <button class="filter-btn" data-typ="Gesetzgebung">Gesetzgebung</button>
        <button class="filter-btn" data-typ="Antrag">Antrag</button>
        <button class="filter-btn" data-typ="Anfrage">Anfrage</button>
      </div>
    </div>

  </div>

  <div class="typ-hinweis" id="typHinweis"></div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Geladen</div><div class="stat-value" id="statTotal">–</div></div>
    <div class="stat-card"><div class="stat-label">Angezeigt</div><div class="stat-value" id="statShown">–</div></div>
    <div class="stat-card"><div class="stat-label">Wahlperiode</div><div class="stat-value" id="statWP">21</div></div>
    <div class="stat-card"><div class="stat-label">Zeitraum aktiv</div><div class="stat-value" id="statZeitraum" style="font-size:13px; padding-top:4px;">Alle</div></div>
  </div>

  <div id="listContainer"><div class="loading"><i class="ti ti-loader"></i> Daten werden geladen…</div></div>
  <div class="pagination" id="pagination" style="display:none;">
    <button id="prevBtn">← Zurück</button>
    <span class="page-info" id="pageInfo"></span>
    <button id="nextBtn">Weiter →</button>
  </div>
</div>

<script>
const DIP_KEY = 'OSOegLs.PR2lwJ1dwCeje9vTj7FPOt3hvpYKtwKkhw';
const BASE = 'https://search.dip.bundestag.de/api/v1';

const FRAKTION_FARBEN = {
  'SPD':{ bg:'#FAECE7', color:'#993C1D' },
  'CDU':{ bg:'#E6F1FB', color:'#0C447C' },
  'CSU':{ bg:'#E6F1FB', color:'#185FA5' },
  'CDU/CSU':{ bg:'#E6F1FB', color:'#0C447C' },
  'Bündnis 90/Die Grünen':{ bg:'#EAF3DE', color:'#3B6D11' },
  'Grüne':{ bg:'#EAF3DE', color:'#3B6D11' },
  'FDP':{ bg:'#FAEEDA', color:'#633806' },
  'AfD':{ bg:'#F1EFE8', color:'#444441' },
  'Die Linke':{ bg:'#FBEAF0', color:'#723554' },
  'BSW':{ bg:'#FBEAF0', color:'#72243E' },
};

const TYP_BESCHREIBUNG = {
  'Gesetzgebung': 'Konkreter Gesetzesentwurf, der in Kraft treten soll. Durchläuft mehrere Lesungen und wird abgestimmt. Ergebnis: neues oder geändertes Gesetz.',
  'Antrag': 'Eine Fraktion fordert die Bundesregierung oder den Bundestag auf, etwas zu tun – ohne dass direkt ein Gesetz entsteht. Politisches Instrument, kein Gesetzgebungsverfahren.',
  'Anfrage': 'Kontrollinstrument des Parlaments gegenüber der Regierung. Die Regierung muss schriftlich antworten. Kleine Anfrage: nur schriftlich. Große Anfrage: kann zu einer Plenardebatte führen.',
};

function slugify(text) {
  if (!text) return '';
  return text.toLowerCase()
    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
    .replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
}

function getFraktionStyle(name) {
  if (!name) return { bg:'#F1EFE8', color:'#444441' };
  for (const key of Object.keys(FRAKTION_FARBEN)) {
    if (name.includes(key)) return FRAKTION_FARBEN[key];
  }
  return { bg:'#F1EFE8', color:'#444441' };
}

function getStatusBadge(status) {
  if (!status) return { cls:'badge-gray', label:'Unbekannt' };
  const s = status.toLowerCase();
  if (s.includes('beschlossen') || s.includes('verabschiedet') || s.includes('abgeschlossen')) return { cls:'badge-green', label:'Verabschiedet' };
  if (s.includes('beratung') || s.includes('anhängig') || s.includes('überwiesen')) return { cls:'badge-blue', label:'In Beratung' };
  if (s.includes('eingebracht') || s.includes('eingegangen')) return { cls:'badge-amber', label:'Eingebracht' };
  if (s.includes('abgelehnt') || s.includes('erledigt')) return { cls:'badge-gray', label:'Abgeschlossen' };
  return { cls:'badge-amber', label: status.substring(0,30) };
}

async function fetchVorgaenge(wahlperiode) {
  const params = new URLSearchParams({ apikey: DIP_KEY, 'f.wahlperiode': wahlperiode, format:'json', rows:'200', sort:'datum desc' });
  const targetUrl = `${BASE}/vorgang?${params}`;
  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://cors.sh/${url}`,
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy(targetUrl), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      if (data.documents) return data.documents;
    } catch(e) { continue; }
  }
  return null;
}

let allItems = [], filtered = [], currentPage = 0;
const perPage = 10;
let activeTyp = '', searchTerm = '', openId = null;
let zeitraumTage = '';
let dateFrom = '', dateTo = '';

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function getDateFilter() {
  if (dateFrom || dateTo) {
    const from = dateFrom ? parseDate(dateFrom) : null;
    const to = dateTo ? parseDate(dateTo + 'T23:59:59') : null;
    return item => {
      const d = parseDate(item.datum);
      if (!d) return false;
      if (from && d < from) return false;
      if (to && d > to) return false;
      return true;
    };
  }
  if (zeitraumTage && zeitraumTage !== 'custom') {
    const cutoff = new Date();
    cutoff.setHours(0, 0, 0, 0);
    cutoff.setDate(cutoff.getDate() - parseInt(zeitraumTage));
    return item => {
      const d = parseDate(item.datum);
      return d !== null && d >= cutoff;
    };
  }
  return () => true;
}

function applyFilters() {
  const dateFn = getDateFilter();
  filtered = allItems.filter(item => {
    const matchTyp = !activeTyp || (item.vorgangstyp && item.vorgangstyp.includes(activeTyp));
    const matchSearch = !searchTerm || (item.titel && item.titel.toLowerCase().includes(searchTerm.toLowerCase()));
    return matchTyp && matchSearch && dateFn(item);
  });
  currentPage = 0;
  document.getElementById('statShown').textContent = filtered.length;
  renderPage();
}

function renderPage() {
  const start = currentPage * perPage;
  const pageItems = filtered.slice(start, start + perPage);
  const container = document.getElementById('listContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Keine Einträge für diesen Zeitraum gefunden.</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  container.innerHTML = '<div class="list" id="itemList"></div>';
  const list = document.getElementById('itemList');

  pageItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';
    const badge = getStatusBadge(item.beratungsstand);
    const fraktion = item.initiative?.[0] || '';
    const fStyle = getFraktionStyle(fraktion);
    const datum = item.datum ? new Date(item.datum).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' }) : '';
    const titel = item.titel || '(kein Titel)';
    const kurzTitel = titel.length > 120 ? titel.substring(0,120) + '…' : titel;
    const dipUrl = `https://dip.bundestag.de/vorgang/${slugify(titel)}/${item.id}`;

    div.innerHTML = `
      <div class="item-top">
        <div class="item-title">${kurzTitel}</div>
        <span class="badge ${badge.cls}">${badge.label}</span>
      </div>
      <div class="item-meta">
        ${datum ? `<span class="meta-item"><i class="ti ti-calendar" style="font-size:13px;"></i>${datum}</span>` : ''}
        ${item.vorgangstyp ? `<span class="meta-item"><i class="ti ti-file-text" style="font-size:13px;"></i>${item.vorgangstyp}</span>` : ''}
        ${fraktion ? `<span class="fraktion-pill" style="background:${fStyle.bg}; color:${fStyle.color};">${fraktion}</span>` : ''}
      </div>
      <div class="detail-panel" id="detail-${item.id}">
        <div class="detail-label">Vorgangsnummer</div>
        <div class="detail-text">${item.id || '–'}</div>
        ${item.beratungsstand ? `<div class="detail-label">Beratungsstand</div><div class="detail-text">${item.beratungsstand}</div>` : ''}
        ${item.abstract ? `<div class="detail-label">Beschreibung</div><div class="detail-text">${item.abstract}</div>` : ''}
        ${item.deskriptor ? `<div class="detail-label">Schlagworte</div><div class="detail-text">${item.deskriptor.map(d => d.name).join(', ')}</div>` : ''}
        <a class="detail-link" href="${dipUrl}" target="_blank">
          <i class="ti ti-external-link" style="font-size:13px;"></i> Im Bundestag öffnen
        </a>
      </div>`;

    div.addEventListener('click', (e) => {
      if (e.target.closest('.detail-link')) return;
      const panel = document.getElementById(`detail-${item.id}`);
      if (openId && openId !== item.id) {
        const old = document.getElementById(`detail-${openId}`);
        if (old) old.classList.remove('open');
      }
      panel.classList.toggle('open');
      openId = panel.classList.contains('open') ? item.id : null;
    });

    list.appendChild(div);
  });

  const totalPages = Math.ceil(filtered.length / perPage);
  const pg = document.getElementById('pagination');
  if (totalPages > 1) {
    pg.style.display = 'flex';
    document.getElementById('pageInfo').textContent = `Seite ${currentPage + 1} von ${totalPages}`;
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
  } else { pg.style.display = 'none'; }
}

async function loadWahlperiode(wp) {
  document.getElementById('listContainer').innerHTML = '<div class="loading"><i class="ti ti-loader"></i> Daten werden geladen…</div>';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('statTotal').textContent = '–';
  document.getElementById('statShown').textContent = '–';
  document.getElementById('statWP').textContent = wp;
  const docs = await fetchVorgaenge(wp);
  if (!docs) {
    document.getElementById('listContainer').innerHTML = `<div class="error-box"><strong>API nicht erreichbar.</strong><br>Alle Verbindungsversuche sind fehlgeschlagen. Bitte Seite neu laden.<br><a href="https://dip.bundestag.de" target="_blank" style="color:#a32d2d;">Direkt auf dip.bundestag.de öffnen</a></div>`;
    return;
  }
  allItems = docs;
  document.getElementById('statTotal').textContent = docs.length;
  applyFilters();
}

// Wahlperiode
document.getElementById('wahlperiodeSelect').addEventListener('change', e => {
  loadWahlperiode(e.target.value);
});

// Zeitraum Schnellauswahl
document.getElementById('zeitraumRow').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('#zeitraumRow .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  zeitraumTage = e.target.dataset.zeitraum;
  const labels = { '':'Alle', '7':'Diese Woche', '30':'Dieser Monat', '90':'Dieses Quartal', '365':'Dieses Jahr', 'custom':'Eigener Zeitraum' };
  document.getElementById('statZeitraum').textContent = labels[zeitraumTage] || 'Eigener';
  dateFrom = ''; dateTo = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  const customRow = document.getElementById('customDateRow');
  customRow.style.display = zeitraumTage === 'custom' ? 'flex' : 'none';
  if (zeitraumTage !== 'custom') applyFilters();
});

// Eigener Zeitraum
document.getElementById('dateFrom').addEventListener('change', e => { dateFrom = e.target.value; applyFilters(); });
document.getElementById('dateTo').addEventListener('change', e => { dateTo = e.target.value; applyFilters(); });
document.getElementById('clearDates').addEventListener('click', () => {
  dateFrom = ''; dateTo = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  applyFilters();
});

// Typ
document.getElementById('filterRow').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('#filterRow .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeTyp = e.target.dataset.typ;
  const hinweis = document.getElementById('typHinweis');
  if (activeTyp && TYP_BESCHREIBUNG[activeTyp]) {
    hinweis.textContent = TYP_BESCHREIBUNG[activeTyp];
    hinweis.style.display = 'block';
  } else {
    hinweis.style.display = 'none';
  }
  applyFilters();
});

// Suche
document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; applyFilters(); });

// Pagination
document.getElementById('prevBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; renderPage(); } });
document.getElementById('nextBtn').addEventListener('click', () => { const tp = Math.ceil(filtered.length / perPage); if (currentPage < tp - 1) { currentPage++; renderPage(); } });

// Start
loadWahlperiode('21');
</script>
</body>
</html>
